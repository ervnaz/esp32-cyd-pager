; ============================================================
;  ESP32 CYD Pager — PlatformIO Project Configuration
;  Board: ESP32-2432S028R ("Cheap Yellow Display")
;  https://github.com/ervnaz/esp32-cyd-pager
; ============================================================

[platformio]
default_envs = cyd
src_dir = .        ; source files are in repo root, not src/

; ------------------------------------------------------------
;  Shared settings inherited by all envs
; ------------------------------------------------------------
[env]
platform          = espressif32 @ ^6.6.0
framework         = arduino
board             = esp32dev

; Serial monitor
monitor_speed     = 115200
monitor_filters   = esp32_exception_decoder, time

; Upload speed
upload_speed      = 921600

; Build flags shared across envs
build_flags =
    ; --- TFT_eSPI: use the User_Setup.h in THIS project,
    ;     not the one buried inside the library folder ---
    -D USER_SETUP_LOADED
    -I .

    ; --- Display: ILI9341 320x240 ---
    -D ILI9341_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MOSI=23
    -D TFT_MISO=19
    -D TFT_SCLK=18
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH

    ; --- Touch: XPT2046 (resistive, Option A default) ---
    -D TOUCH_CS=33
    -D TOUCH_SCLK=25
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_IRQ=36

    ; --- SPI bus frequencies ---
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000

    ; --- ESP32 partition / memory ---
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=8192

; ------------------------------------------------------------
;  Main target: CYD with resistive XPT2046 touch (default)
; ------------------------------------------------------------
[env:cyd]
lib_deps =
    ; TFT display driver
    bodmer/TFT_eSPI @ ^2.5.43
    ; Resistive touch (Option A) — registry is pinned at 0.0.0-alpha, use SHA ref
    paulstoffregen/XPT2046_Touchscreen @ 0.0.0-alpha+sha.26b691b2c8

; Optional: pull a specific ESP32 Arduino core
platform_packages =
    framework-arduinoespressif32 @ ^3.0.7

; ------------------------------------------------------------
;  Alternate target: CYD with capacitive CST816S touch
;  Uncomment Option B lines in .ino and use: pio run -e cyd_cap
; ------------------------------------------------------------
[env:cyd_cap]
build_flags =
    ${env.build_flags}
    -D USE_CAP_TOUCH          ; signal to .ino to use CST816S

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    fbiego/CST816S @ ^1.1.0                                        ; capacitive touch driver
    paulstoffregen/XPT2046_Touchscreen @ 0.0.0-alpha+sha.26b691b2c8  ; header still included in .ino

; ------------------------------------------------------------
;  CI / headless verify-only (no upload port needed)
;  Used by GitHub Actions to confirm the sketch compiles clean
; ------------------------------------------------------------
[env:ci]
build_flags =
    ${env.build_flags}
    -D CI_BUILD               ; lets .ino skip any hardware-only inits

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    paulstoffregen/XPT2046_Touchscreen @ 0.0.0-alpha+sha.26b691b2c8

; No upload — compile check only
targets = buildfs
