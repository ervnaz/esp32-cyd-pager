# =============================================================================
#  ESPHome Configuration — ESP32 CYD Pager Node
#  Board: ESP32-2432S028R ("Cheap Yellow Display")
#
#  Usage:
#    1. Copy and rename per unit: pager-unit1.yaml, pager-unit2.yaml ...
#    2. Change `device_name` substitution (unique per unit, max 8 chars)
#    3. Fill in secrets.yaml with your WiFi credentials
#    4. First flash via USB: esphome run pager-node.yaml
#    5. Subsequent updates via OTA: esphome run pager-node.yaml
#
#  Files needed alongside this yaml:
#    - secrets.yaml       (WiFi / API / OTA passwords)
#    - espnow_bridge.h    (custom ESP-NOW C++ glue)
# =============================================================================

substitutions:
  device_name: "unit-1"          # ← unique per unit, max 8 chars, no spaces
  device_friendly: "Pager Unit 1"

# -----------------------------------------------------------------------------
#  Core
# -----------------------------------------------------------------------------
esphome:
  name: cyd-pager-${device_name}
  friendly_name: ${device_friendly}
  comment: "ESP32 CYD mesh pager node"
  includes:
    - espnow_bridge.h             # custom ESP-NOW glue
  on_boot:
    priority: 600
    then:
      - logger.log: "CYD Pager booting..."
      - light.turn_on:
          id: backlight
          brightness: 100%
      - lambda: |-
          espnow_bridge_init();

esp32:
  board: esp32dev
  framework:
    type: arduino

# -----------------------------------------------------------------------------
#  Logging
# -----------------------------------------------------------------------------
logger:
  level: DEBUG
  baud_rate: 115200

# -----------------------------------------------------------------------------
#  WiFi — ESP-NOW runs on the same radio alongside WiFi
# -----------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "CYD-Pager-${device_name}"
    password: !secret ap_password

captive_portal:

# -----------------------------------------------------------------------------
#  OTA updates
# -----------------------------------------------------------------------------
ota:
  - platform: esphome
    password: !secret ota_password

# -----------------------------------------------------------------------------
#  Home Assistant API + send_message service
# -----------------------------------------------------------------------------
api:
  encryption:
    key: !secret api_encryption_key
  services:
    - service: send_message
      variables:
        message: string
      then:
        - lambda: |-
            espnow_send_message(message.c_str());

# -----------------------------------------------------------------------------
#  SPI buses
#  VSPI → ILI9341 display   (CLK=18, MOSI=23, MISO=19)
#  HSPI → XPT2046 touch     (CLK=25, MOSI=32, MISO=39)
# -----------------------------------------------------------------------------
spi:
  - id: tft_spi
    clk_pin: GPIO18
    mosi_pin: GPIO23
    miso_pin: GPIO19

  - id: touch_spi
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# -----------------------------------------------------------------------------
#  Backlight  GPIO21, active HIGH
# -----------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
    frequency: "1000Hz"

light:
  - platform: monochromatic
    output: backlight_pwm
    id: backlight
    name: "Display Backlight"
    restore_mode: ALWAYS_ON

# -----------------------------------------------------------------------------
#  ILI9341 display  320x240, landscape
#  reset_pin intentionally omitted — tied to EN rail on CYD
# -----------------------------------------------------------------------------
display:
  - platform: ili9xxx
    model: ILI9341
    id: tft
    spi_id: tft_spi
    cs_pin: GPIO15
    dc_pin: GPIO2
    rotation: 90
    invert_colors: false
    update_interval: 500ms
    lambda: |-
      // Background
      it.fill(Color(8, 8, 66));

      // Status bar
      it.filled_rectangle(0, 0, 320, 20, Color(16, 16, 130));
      it.printf(4, 6, id(font_small), Color(0, 255, 255), "${device_name}");
      it.printf(130, 6, id(font_small), Color(128, 128, 128),
                "%d peer(s)", (int)id(peer_count).state);
      if (id(unread_count).state > 0) {
        it.printf(280, 6, id(font_small), Color(253, 160, 0),
                  "[%d]", (int)id(unread_count).state);
      }

      // Tab bar
      it.filled_rectangle(0, 20, 320, 30, Color(16, 16, 130));
      it.print(14,  31, id(font_small), Color(0, 255, 255), "INBOX");
      it.print(120, 31, id(font_small), Color(128, 128, 128), "COMPOSE");
      it.print(250, 31, id(font_small), Color(128, 128, 128), "PEERS");

      // Last received message
      it.print(4, 58, id(font_small), Color(128, 128, 128), "FROM:");
      it.printf(4, 74, id(font_small), Color(255, 255, 255),
                "%s", id(last_sender).state.c_str());
      it.printf(4, 90, id(font_small), Color(200, 200, 200),
                "%s", id(last_message).state.c_str());

      // Last sent message
      it.print(4, 115, id(font_small), Color(128, 128, 128), "SENT:");
      it.printf(4, 131, id(font_small), Color(200, 200, 200),
                "%s", id(sent_message).state.c_str());

      // Notification banner
      if (id(notify_active).state) {
        it.filled_rectangle(4, 52, 312, 40, Color(253, 160, 0));
        it.rectangle(4, 52, 312, 40, Color(255, 255, 255));
        it.printf(8, 56, id(font_small), Color(0, 0, 0),
                  "MSG FROM: %s", id(last_sender).state.c_str());
        it.printf(8, 72, id(font_small), Color(0, 0, 0),
                  "%s", id(last_message).state.c_str());
      }

# -----------------------------------------------------------------------------
#  Fonts
# -----------------------------------------------------------------------------
font:
  - file: "gfonts://Roboto Mono"
    id: font_small
    size: 12
  - file: "gfonts://Roboto Mono"
    id: font_medium
    size: 16

# -----------------------------------------------------------------------------
#  XPT2046 resistive touch
# -----------------------------------------------------------------------------
touchscreen:
  - platform: xpt2046
    id: touch
    spi_id: touch_spi
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    calibration:
      x_min: 200
      x_max: 3800
      y_min: 300
      y_max: 3700
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_touch:
      then:
        - logger.log:
            format: "Touch x=%d y=%d"
            args: ["touch.x", "touch.y"]

# -----------------------------------------------------------------------------
#  Sensors
# -----------------------------------------------------------------------------
sensor:
  - platform: template
    id: peer_count
    name: "Active Peers"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      return (float)espnow_peer_count;

  - platform: template
    id: unread_count
    name: "Unread Messages"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      return (float)espnow_unread_count;

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"

# -----------------------------------------------------------------------------
#  Text sensors
# -----------------------------------------------------------------------------
text_sensor:
  - platform: template
    id: last_message
    name: "Last Received Message"
    update_interval: 1s
    lambda: |-
      return espnow_last_body;

  - platform: template
    id: last_sender
    name: "Last Sender"
    update_interval: 1s
    lambda: |-
      return espnow_last_sender;

  - platform: template
    id: sent_message
    name: "Last Sent Message"
    update_interval: 1s
    lambda: |-
      return espnow_last_sent;

  - platform: template
    id: notify_active
    name: "Notification Active"
    update_interval: 500ms
    lambda: |-
      return std::string(espnow_notify_visible ? "true" : "false");

# -----------------------------------------------------------------------------
#  Binary sensors
# -----------------------------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Boot Button"
    on_press:
      then:
        - lambda: |-
            espnow_unread_count = 0;
        - logger.log: "Unread cleared"

  - platform: status
    name: "Node Status"

# -----------------------------------------------------------------------------
#  Button
# -----------------------------------------------------------------------------
button:
  - platform: restart
    name: "Restart"

# -----------------------------------------------------------------------------
#  Interval — ESP-NOW heartbeat + peer expiry + notification dismiss
# -----------------------------------------------------------------------------
interval:
  - interval: 1s
    then:
      - lambda: |-
          espnow_bridge_loop();
