# =============================================================================
#  ESPHome Configuration — ESP32 CYD Pager Node
#  Board: ESP32-2432S028R ("Cheap Yellow Display")
#
#  Display config based on confirmed working power-display-esphome.yaml
#  Framework: arduino (confirmed working)
#  SPI: CLK=14, MOSI=13, MISO=12 (confirmed working)
#  Backlight: ledc + monochromatic on GPIO21 (confirmed working)
# =============================================================================

substitutions:
  device_name: "unit-1"
  device_friendly: "Pager Unit 1"

# -----------------------------------------------------------------------------
#  Core
# -----------------------------------------------------------------------------
esphome:
  name: cyd-pager-${device_name}
  friendly_name: ${device_friendly}
  comment: "ESP32 CYD mesh pager node"
  includes:
    - espnow_bridge.h

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG
  baud_rate: 115200

api:
  encryption:
    key: !secret api_encryption_key
  services:
    - service: send_message
      variables:
        message: string
      then:
        - lambda: |-
            espnow_send_message(message.c_str());

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "CYD-Pager-${device_name}"
    password: !secret ap_password
  on_connect:
    then:
      - logger.log: "WiFi up — starting ESP-NOW bridge"
      - lambda: |-
          espnow_bridge_init();

captive_portal:

# -----------------------------------------------------------------------------
#  SPI — exactly as per confirmed working power-display-esphome.yaml
#  Single bus for display; touch on separate HSPI
# -----------------------------------------------------------------------------
spi:
  - id: tft_spi
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

  - id: touch_spi
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# -----------------------------------------------------------------------------
#  Backlight — ledc + monochromatic (confirmed working)
# -----------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO21
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

# -----------------------------------------------------------------------------
#  Display — confirmed working settings from power-display-esphome.yaml
#  model: TFT 2.4, rotation: 180, invert_colors: false, color_palette: 8BIT
# -----------------------------------------------------------------------------
display:
  - platform: ili9xxx
    model: TFT 2.4
    id: tft
    spi_id: tft_spi
    cs_pin: GPIO15
    dc_pin: GPIO2
    rotation: 180
    invert_colors: false
    color_palette: 8BIT
    update_interval: 500ms
    lambda: |-
      auto C_BG     = Color(0,   0,   128);
      auto C_PANEL  = Color(0,   0,   192);
      auto C_CYAN   = Color(0,   255, 255);
      auto C_WHITE  = Color(255, 255, 255);
      auto C_GRAY   = Color(128, 128, 128);
      auto C_ORANGE = Color(255, 128, 0);
      auto C_BLACK  = Color(0,   0,   0);

      it.fill(C_BG);

      // Status bar
      it.filled_rectangle(0, 0, 240, 20, C_PANEL);
      it.print(4, 4, id(font_small), C_CYAN, "${device_name}");
      it.printf(90, 4, id(font_small), C_GRAY, "%d peer(s)", (int)id(peer_count).state);
      if (id(unread_count).state > 0) {
        it.printf(188, 4, id(font_small), C_ORANGE, "[%d]", (int)id(unread_count).state);
      }

      // Tab bar
      it.filled_rectangle(0, 20, 240, 28, C_PANEL);
      it.filled_rectangle(0, 20, 80, 28, C_CYAN);
      it.print(10,  26, id(font_small), C_BLACK, "INBOX");
      it.print(86,  26, id(font_small), C_GRAY,  "COMPOSE");
      it.print(172, 26, id(font_small), C_GRAY,  "PEERS");
      it.line(80,  20, 80,  48, C_BG);
      it.line(160, 20, 160, 48, C_BG);

      // FROM section
      it.horizontal_line(0, 52, 240, C_GRAY);
      it.print(4,  56, id(font_small), C_GRAY,  "FROM:");
      it.printf(4, 70, id(font_small), C_CYAN,  "%s", id(last_sender).state.c_str());
      it.printf(4, 84, id(font_small), C_WHITE, "%s", id(last_message).state.c_str());

      // SENT section
      it.horizontal_line(0, 106, 240, C_GRAY);
      it.print(4,   110, id(font_small), C_GRAY,  "SENT:");
      it.printf(4,  124, id(font_small), C_WHITE, "%s", id(sent_message).state.c_str());

      // Footer
      it.horizontal_line(0, 300, 240, C_GRAY);
      it.printf(4, 304, id(font_small), C_GRAY,
                "ESP-NOW peers:%d", (int)id(peer_count).state);

      // Notification banner
      if (id(notify_active).state == "true") {
        it.filled_rectangle(4, 50, 232, 40, C_ORANGE);
        it.rectangle(4, 50, 232, 40, C_WHITE);
        it.printf(8, 54, id(font_small), C_BLACK, "MSG: %s", id(last_sender).state.c_str());
        it.printf(8, 68, id(font_small), C_BLACK, "%s", id(last_message).state.c_str());
      }

# -----------------------------------------------------------------------------
#  Fonts
# -----------------------------------------------------------------------------
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 11
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~"
  - file: "gfonts://Roboto"
    id: font_medium
    size: 14
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~"

# -----------------------------------------------------------------------------
#  XPT2046 resistive touch
# -----------------------------------------------------------------------------
touchscreen:
  - platform: xpt2046
    id: touch
    spi_id: touch_spi
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    calibration:
      x_min: 200
      x_max: 3800
      y_min: 300
      y_max: 3700
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_touch:
      then:
        - logger.log:
            format: "Touch x=%d y=%d"
            args: ["touch.x", "touch.y"]

# -----------------------------------------------------------------------------
#  Sensors
# -----------------------------------------------------------------------------
sensor:
  - platform: template
    id: peer_count
    name: "Active Peers"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      return (float)espnow_peer_count;

  - platform: template
    id: unread_count
    name: "Unread Messages"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      return (float)espnow_unread_count;

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"

# -----------------------------------------------------------------------------
#  Text sensors
# -----------------------------------------------------------------------------
text_sensor:
  - platform: template
    id: last_message
    name: "Last Received Message"
    update_interval: 5s
    lambda: |-
      return espnow_last_body;

  - platform: template
    id: last_sender
    name: "Last Sender"
    update_interval: 5s
    lambda: |-
      return espnow_last_sender;

  - platform: template
    id: sent_message
    name: "Last Sent Message"
    update_interval: 5s
    lambda: |-
      return espnow_last_sent;

  - platform: template
    id: notify_active
    name: "Notification Active"
    update_interval: 2s
    lambda: |-
      return std::string(espnow_notify_visible ? "true" : "false");

# -----------------------------------------------------------------------------
#  Binary sensors
# -----------------------------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Boot Button"
    on_press:
      then:
        - lambda: |-
            espnow_unread_count = 0;
        - logger.log: "Unread cleared"

  - platform: status
    name: "Node Status"

# -----------------------------------------------------------------------------
#  Button
# -----------------------------------------------------------------------------
button:
  - platform: restart
    name: "Restart"

# -----------------------------------------------------------------------------
#  Interval — ESP-NOW heartbeat + peer expiry
# -----------------------------------------------------------------------------
interval:
  - interval: 1s
    then:
      - lambda: |-
          espnow_bridge_loop();
