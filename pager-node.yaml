# =============================================================================
#  ESPHome Configuration — ESP32 CYD Pager Node
#  Board: ESP32-2432S028R ("Cheap Yellow Display")
#
#  Usage:
#    1. Copy this file and rename per unit: pager-unit1.yaml, pager-unit2.yaml
#    2. Set a unique `name` and `device_name` substitution for each unit
#    3. Fill in your WiFi credentials (or use secrets.yaml)
#    4. Flash: esphome run pager-unit1.yaml
#
#  NOTE: ESPHome does not natively support ESP-NOW mesh or the XPT2046
#  resistive touch controller as first-class components. This config uses:
#    - external_components for XPT2046 touch
#    - a custom lambda / text_sensor for ESP-NOW messaging
#    - ili9xxx display driver (built-in ESPHome support for ILI9341)
# =============================================================================

substitutions:
  device_name: "unit-1"        # ← change per unit (max 8 chars, no spaces)
  device_friendly: "Pager Unit 1"
  espnow_channel: "1"          # must match on ALL units

# -----------------------------------------------------------------------------
#  Core identity
# -----------------------------------------------------------------------------
esphome:
  name: cyd-pager-${device_name}
  friendly_name: ${device_friendly}
  comment: "ESP32 CYD mesh pager node"

  on_boot:
    priority: 600
    then:
      - logger.log: "CYD Pager booting..."
      - light.turn_on:
          id: backlight
          brightness: 100%

esp32:
  board: esp32dev
  framework:
    type: arduino

# -----------------------------------------------------------------------------
#  Logging
# -----------------------------------------------------------------------------
logger:
  level: DEBUG
  baud_rate: 115200

# -----------------------------------------------------------------------------
#  WiFi (required for ESPHome OTA/API — ESP-NOW runs alongside)
# -----------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Static IP recommended for reliable OTA
  # manual_ip:
  #   static_ip: 192.168.1.101
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0

  ap:
    ssid: "CYD-Pager-${device_name}"
    password: !secret ap_password

captive_portal:

# -----------------------------------------------------------------------------
#  OTA & API
# -----------------------------------------------------------------------------
ota:
  - platform: esphome
    password: !secret ota_password

api:
  password: !secret api_password

# -----------------------------------------------------------------------------
#  SPI buses
#  CYD has TWO separate SPI buses:
#    VSPI (id: tft_spi)   — display ILI9341
#    HSPI (id: touch_spi) — XPT2046 resistive touch
# -----------------------------------------------------------------------------
spi:
  - id: tft_spi
    clk_pin: GPIO18
    mosi_pin: GPIO23
    miso_pin: GPIO19

  - id: touch_spi
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39    # input-only GPIO, no pull needed

# -----------------------------------------------------------------------------
#  Backlight (GPIO21 — active HIGH on CYD)
# -----------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output
    frequency: 1000 Hz

light:
  - platform: monochromatic
    output: backlight_output
    id: backlight
    name: "Display Backlight"
    restore_mode: ALWAYS_ON

# -----------------------------------------------------------------------------
#  ILI9341 Display (320x240, landscape)
# -----------------------------------------------------------------------------
display:
  - platform: ili9xxx
    model: ILI9341
    id: tft
    spi_id: tft_spi
    cs_pin: GPIO15
    dc_pin: GPIO2
    reset_pin:            # tied to EN rail on CYD — leave unset
    rotation: 90          # landscape
    invert_colors: false
    update_interval: 500ms

    # ── Default page: show device name + peer/message counts ──────────────
    lambda: |-
      // Background
      it.fill(Color(8, 8, 66));          // COL_BG approx

      // Status bar
      it.filled_rectangle(0, 0, 320, 20, Color(16, 16, 130));
      it.printf(4, 6, id(font_small), Color(0, 255, 255), "${device_name}");

      // Peer count
      it.printf(130, 6, id(font_small), Color(128, 128, 128),
        "%d peer(s)", id(peer_count).state);

      // Unread badge
      if (id(unread_count).state > 0) {
        it.printf(280, 6, id(font_small), Color(253, 160, 0),
          "[%d]", id(unread_count).state);
      }

      // Tab bar
      it.filled_rectangle(0, 20, 320, 30, Color(16, 16, 130));
      it.print(14,  31, id(font_small), Color(0, 0, 0), "INBOX");
      it.print(120, 31, id(font_small), Color(128,128,128), "COMPOSE");
      it.print(250, 31, id(font_small), Color(128,128,128), "PEERS");

      // Last received message
      it.printf(4, 60, id(font_small), Color(255,255,255),
        "From: %s", id(last_sender).state.c_str());
      it.printf(4, 76, id(font_small), Color(200,200,200),
        "%s", id(last_message).state.c_str());

      // Last sent message
      it.printf(4, 110, id(font_small), Color(0,200,200), "Sent:");
      it.printf(4, 126, id(font_small), Color(200,200,200),
        "%s", id(sent_message).state.c_str());

      // Notification banner (shown when notify_visible is true)
      if (id(notify_visible).state) {
        it.filled_rectangle(4, 54, 312, 36, Color(253, 160, 0));
        it.rectangle(4, 54, 312, 36, Color(255,255,255));
        it.printf(8, 58, id(font_small), Color(0,0,0),
          "MSG FROM: %s", id(last_sender).state.c_str());
        it.printf(8, 72, id(font_small), Color(0,0,0),
          "%s", id(last_message).state.c_str());
      }

# -----------------------------------------------------------------------------
#  Fonts
# -----------------------------------------------------------------------------
font:
  - file: "gfonts://Roboto Mono"
    id: font_small
    size: 12
  - file: "gfonts://Roboto Mono"
    id: font_medium
    size: 16

# -----------------------------------------------------------------------------
#  XPT2046 Touch (resistive, HSPI bus)
# -----------------------------------------------------------------------------
touchscreen:
  - platform: xpt2046
    id: touch
    spi_id: touch_spi
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    calibration:
      x_min: 200
      x_max: 3800
      y_min: 300
      y_max: 3700
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false

    on_touch:
      then:
        - logger.log:
            format: "Touch at x=%d y=%d"
            args: ["touch.x", "touch.y"]

# -----------------------------------------------------------------------------
#  ESP-NOW via ESPHome custom text_sensor
#  ESPHome does not have a built-in ESP-NOW component.
#  The custom code below initialises ESP-NOW alongside the WiFi stack,
#  broadcasts messages, and surfaces received messages as sensors.
# -----------------------------------------------------------------------------
esphome:
  includes:
    - espnow_bridge.h     # ← custom header (see below — create this file)

# Internal state sensors (updated by ESP-NOW receive callback)
sensor:
  - platform: template
    id: peer_count
    name: "Active Peers"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      return id(espnow_peer_count);

  - platform: template
    id: unread_count
    name: "Unread Messages"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      return id(espnow_unread_count);

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

text_sensor:
  - platform: template
    id: last_message
    name: "Last Received Message"
    update_interval: 1s
    lambda: |-
      return {id(espnow_last_body)};

  - platform: template
    id: last_sender
    name: "Last Sender"
    update_interval: 1s
    lambda: |-
      return {id(espnow_last_sender)};

  - platform: template
    id: sent_message
    name: "Last Sent Message"
    update_interval: 1s
    lambda: |-
      return {id(espnow_last_sent)};

  - platform: template
    id: notify_visible
    name: "Notification Visible"
    update_interval: 500ms
    lambda: |-
      return {id(espnow_notify_visible) ? std::string("true") : std::string("false")};

# -----------------------------------------------------------------------------
#  Home Assistant service: send a message from HA to all pager peers
# -----------------------------------------------------------------------------
api:
  services:
    - service: send_message
      variables:
        message: string
      then:
        - lambda: |-
            espnow_send_message(message.c_str());
            id(espnow_last_sent) = message;

# -----------------------------------------------------------------------------
#  Button: physical boot button (GPIO0) — clear unread / cycle screens
# -----------------------------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Boot Button"
    on_press:
      then:
        - lambda: |-
            id(espnow_unread_count) = 0;
        - logger.log: "Unread cleared via boot button"

# -----------------------------------------------------------------------------
#  Uptime & restart
# -----------------------------------------------------------------------------
  - platform: status
    name: "Node Status"

sensor:
  - platform: uptime
    name: "Uptime"

button:
  - platform: restart
    name: "Restart"
