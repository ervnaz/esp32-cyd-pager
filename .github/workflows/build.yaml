name: Build Firmware

on:
  push:
    branches: [main]
    tags:
      - "v*"          # v1.0, v1.2.3, etc.
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Cache PlatformIO packages ───────────────────────────────────────────
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      # ── Install PlatformIO ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build firmware
        run: pio run -e cyd

      # ── Rename binary with version/commit info ──────────────────────────────
      - name: Prepare firmware artifact
        run: |
          mkdir -p dist
          # Tag builds get the tag name; branch builds get the short commit SHA
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          cp .pio/build/cyd/firmware.bin   dist/cyd-pager-${VERSION}.bin
          cp .pio/build/cyd/bootloader.bin dist/cyd-pager-${VERSION}-bootloader.bin
          cp .pio/build/cyd/partitions.bin dist/cyd-pager-${VERSION}-partitions.bin
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # ── Upload build artifact (available on every push/PR) ─────────────────
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyd-pager-${{ env.VERSION }}
          path: dist/
          retention-days: 30

      # ── Publish GitHub Release (only on version tags) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "CYD Pager ${{ env.VERSION }}"
          body: |
            ## CYD Pager ${{ env.VERSION }}

            ### Installation

            #### Option A — esptool (recommended)
            ```bash
            pip install esptool

            esptool.py --chip esp32 --port COMX --baud 921600 \
              --before default_reset --after hard_reset write_flash \
              0x1000  cyd-pager-${{ env.VERSION }}-bootloader.bin \
              0x8000  cyd-pager-${{ env.VERSION }}-partitions.bin \
              0x10000 cyd-pager-${{ env.VERSION }}.bin
            ```
            Replace `COMX` with your port (`COM3`, `/dev/ttyUSB0`, etc.)

            #### Option B — ESP Web Flasher (browser, no install needed)
            1. Open https://esp.huhn.me in Chrome or Edge
            2. Click **Connect** and select your device
            3. Set offset `0x10000` and upload `cyd-pager-${{ env.VERSION }}.bin`
            4. For a clean install also flash bootloader (`0x1000`) and partitions (`0x8000`)

            ### First boot
            - Device name is auto-generated from MAC address (e.g. `ND-A3F2C1`)
            - Go to **PEERS** tab → tap **RENAME THIS DEVICE** to set a custom name
            - All devices must use the same `MESH_CHANNEL` (default: 1)

            ### Changing encryption keys
            Edit `PAGER_PMK_BYTES` and `PAGER_LMK_BYTES` in `config.h`, then rebuild.
            All units in the same mesh must share identical keys.

          files: |
            dist/cyd-pager-${{ env.VERSION }}.bin
            dist/cyd-pager-${{ env.VERSION }}-bootloader.bin
            dist/cyd-pager-${{ env.VERSION }}-partitions.bin
          draft: false
          prerelease: false
